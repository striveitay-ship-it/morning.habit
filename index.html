<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        
        .joke-box {
            background: #f7f7f7;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 5px solid #667eea;
        }
        
        .joke-text {
            font-size: 1.2em;
            color: #333;
            line-height: 1.6;
            text-align: center;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            font-style: italic;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .error {
            color: #e74c3c;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Joke Generator</h1>
        <div class="joke-box">
            <div class="joke-text" id="jokeDisplay">Click the button to get a joke!</div>
        </div>
        <button onclick="getJoke()">Get Another Joke</button>
        <div class="error" id="errorMessage"></div>
    </div>

    <script>
        async function getJoke() {
            const jokeDisplay = document.getElementById('jokeDisplay');
            const errorMessage = document.getElementById('errorMessage');
            
            // Clear error message
            errorMessage.textContent = '';
            
            // Show loading state
            jokeDisplay.innerHTML = '<div class="loading">Loading a joke...</div>';
            
            try {
                // Fetch from JokeAPI (free, no authentication needed)
                const response = await fetch('https://v2.jokeapi.dev/joke/Any');
                
                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }
                
                const data = await response.json();
                
                // Handle two types of jokes: single and setup/delivery
                let jokeText;
                if (data.type === 'single') {
                    jokeText = data.joke;
                } else if (data.type === 'twopart') {
                    jokeText = `<strong>${data.setup}</strong><br><br>${data.delivery}`;
                }
                
                jokeDisplay.innerHTML = jokeText;
            } catch (error) {
                jokeDisplay.innerHTML = 'Oops! Could not fetch a joke.';
                errorMessage.textContent = 'Error: ' + error.message;
                console.error('Error:', error);
            }
        }
        
        // Load a joke when the page loads
        window.addEventListener('DOMContentLoaded', getJoke);
    </script>
</body>
</html>
